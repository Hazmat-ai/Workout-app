name: FitForge
options:
  bundleIdPrefix: com.fitforge
targets:
  FitForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
      - Core
      - Features
      - Components
      - path: Resources/Assets.xcassets
        type: folder
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "FitForge reads your activity and health data to personalize your experience."
        NSHealthUpdateUsageDescription: "FitForge saves your workouts to Apple Health."
        NSCameraUsageDescription: "Used to scan food barcodes for quick calorie logging."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
    settings:
      base:
        DEVELOPMENT_TEAM: "" # Set your team here
        TARGETED_DEVICE_FAMILY: "1" # iPhone only usually, "1,2" for iPad
